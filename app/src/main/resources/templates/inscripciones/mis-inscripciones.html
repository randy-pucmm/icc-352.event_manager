<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Mis Inscripciones</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">
                    <i class="fas fa-ticket-alt me-2 text-primary"></i>Mis Inscripciones
                </h2>
                <p class="text-muted mb-0">Tus inscripciones a eventos y códigos QR</p>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(inscripciones)}" class="text-center py-5">
                <i class="fas fa-ticket-alt fa-3x text-muted mb-3"></i>
                <h5 class="text-muted">No tienes inscripciones aún</h5>
                <a href="/eventos" class="btn btn-primary mt-2">
                    <i class="fas fa-calendar-alt me-1"></i>Explorar Eventos
                </a>
            </div>

            <!-- Inscriptions list -->
            <div class="row g-4" th:unless="${#lists.isEmpty(inscripciones)}">
                <div class="col-md-6 col-xl-4" th:each="insc : ${inscripciones}">
                    <div class="card border-0 shadow-sm h-100 inscripcion-card"
                         th:classappend="${insc.estado.name() == 'CANCELADA'} ? 'inscripcion-cancelada' : ''">
                        <div class="card-body p-4">
                            <!-- Header -->
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h5 class="card-title fw-semibold mb-0" th:text="${insc.evento.titulo}">Evento</h5>
                                <div>
                                    <span class="badge bg-success" th:if="${insc.estado.name() == 'ACTIVA' && !insc.estaPresente}">Activa</span>
                                    <span class="badge bg-info" th:if="${insc.estado.name() == 'ACTIVA' && insc.estaPresente}">
                                        <i class="fas fa-check me-1"></i>Asistió
                                    </span>
                                    <span class="badge bg-secondary" th:if="${insc.estado.name() == 'CANCELADA'}">Cancelada</span>
                                </div>
                            </div>

                            <!-- Event info -->
                            <div class="mb-3">
                                <div class="d-flex align-items-center mb-1">
                                    <i class="fas fa-clock text-primary me-2 small"></i>
                                    <small th:text="${#temporals.format(insc.evento.fechaInicio, 'dd/MM/yyyy HH:mm')}">Fecha</small>
                                </div>
                                <div class="d-flex align-items-center mb-1">
                                    <i class="fas fa-map-marker-alt text-danger me-2 small"></i>
                                    <small th:text="${insc.evento.lugar}">Lugar</small>
                                </div>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-calendar-check text-success me-2 small"></i>
                                    <small>Inscrito el <span th:text="${#temporals.format(insc.fechaInscripcion, 'dd/MM/yyyy')}">Fecha</span></small>
                                </div>
                            </div>

                            <!-- QR Code for active inscriptions -->
                            <div th:if="${insc.estado.name() == 'ACTIVA'}" class="qr-container text-center mb-3">
                                <div class="qr-code" th:data-token="${insc.tokenQr}"></div>
                                <small class="text-muted d-block mt-1">Token: <code th:text="${#strings.abbreviate(insc.tokenQr, 16)}">UUID</code></small>
                            </div>

                            <!-- Actions -->
                            <div class="d-flex gap-2" th:if="${insc.estado.name() == 'ACTIVA' && !insc.estaPresente}">
                                <a th:href="'/eventos/' + ${insc.evento.id}" class="btn btn-outline-primary btn-sm flex-fill">
                                    <i class="fas fa-eye me-1"></i>Ver Evento
                                </a>
                                <button type="button" class="btn btn-outline-danger btn-sm flex-fill btn-cancelar-insc"
                                        th:data-id="${insc.id}">
                                    <i class="fas fa-times me-1"></i>Cancelar
                                </button>
                            </div>
                            <div th:if="${insc.estado.name() == 'ACTIVA' && insc.estaPresente}">
                                <a th:href="'/eventos/' + ${insc.evento.id}" class="btn btn-outline-primary btn-sm w-100">
                                    <i class="fas fa-eye me-1"></i>Ver Evento
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- QRCode.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            // Generate QR codes
            document.querySelectorAll('.qr-code').forEach(function(el) {
                const token = el.dataset.token;
                if (token && typeof QRCode !== 'undefined') {
                    new QRCode(el, {
                        text: token,
                        width: 150,
                        height: 150,
                        colorDark: '#1a1d2e',
                        colorLight: '#ffffff'
                    });
                }
            });

            // Cancel inscription
            document.querySelectorAll('.btn-cancelar-insc').forEach(function(btn) {
                btn.addEventListener('click', async function() {
                    if (!confirm('¿Cancelar esta inscripción? No podrás deshacer esta acción.')) return;
                    const id = this.dataset.id;
                    try {
                        const data = await window.apiFetch('/inscripciones/' + id + '/cancelar', { method: 'POST' });
                        if (data.success) {
                            location.reload();
                        } else {
                            alert(data.message || 'Error al cancelar');
                        }
                    } catch (err) {
                        alert('Error: ' + err.message);
                    }
                });
            });
        });
    </script>
</body>
</html>
