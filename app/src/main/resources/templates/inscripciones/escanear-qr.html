<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Escanear QR</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">
                    <i class="fas fa-qrcode me-2 text-primary"></i>Escanear QR
                </h2>
                <p class="text-muted mb-0">Escanea el código QR de un participante para registrar su asistencia</p>
            </div>

            <div class="row g-4">
                <!-- Scanner column -->
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-semibold mb-0">
                                    <i class="fas fa-camera me-2 text-primary"></i>Escáner de Cámara
                                </h5>
                                <button id="btnToggleScanner" class="btn btn-primary btn-sm">
                                    <i class="fas fa-play me-1"></i>Iniciar Escáner
                                </button>
                            </div>
                            <div id="qr-reader" class="qr-scanner-container"></div>
                            <div id="scanner-placeholder" class="scanner-placeholder text-center py-5">
                                <i class="fas fa-camera fa-3x text-muted mb-3 d-block"></i>
                                <p class="text-muted mb-0">Presiona "Iniciar Escáner" para activar la cámara</p>
                            </div>

                            <!-- Manual token input -->
                            <div class="mt-4 pt-3 border-top">
                                <h6 class="fw-semibold mb-2">
                                    <i class="fas fa-keyboard me-2 text-secondary"></i>Ingreso Manual
                                </h6>
                                <div class="input-group">
                                    <input type="text" id="manualToken" class="form-control"
                                           placeholder="Pega el token QR aquí...">
                                    <button id="btnManualVerify" class="btn btn-primary">
                                        <i class="fas fa-check me-1"></i>Verificar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Result column -->
                <div class="col-lg-5">
                    <!-- Result card -->
                    <div id="resultCard" class="card border-0 shadow-sm mb-4" style="display:none;">
                        <div class="card-body p-4">
                            <h5 class="fw-semibold mb-3">
                                <i class="fas fa-clipboard-check me-2"></i>Resultado
                            </h5>
                            <div id="resultContent"></div>
                        </div>
                    </div>

                    <!-- Recent scans -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-semibold mb-0">
                                    <i class="fas fa-history me-2 text-secondary"></i>Escaneos Recientes
                                </h5>
                                <span class="badge bg-primary" id="scanCount">0</span>
                            </div>
                            <div id="recentScans">
                                <p class="text-muted text-center small mb-0">No hay escaneos aún</p>
                            </div>
                        </div>
                    </div>

                    <!-- Quick links to attendance lists -->
                    <div class="card border-0 shadow-sm mt-4" th:unless="${#lists.isEmpty(eventos)}">
                        <div class="card-body p-4">
                            <h5 class="fw-semibold mb-3">
                                <i class="fas fa-list-check me-2 text-secondary"></i>Listas de Asistencia
                            </h5>
                            <div class="list-group list-group-flush">
                                <a th:each="evento : ${eventos}"
                                   th:href="'/eventos/' + ${evento.id} + '/asistencia'"
                                   th:if="${!evento.cancelado}"
                                   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center px-0 border-0">
                                    <span th:text="${evento.titulo}" class="small">Evento</span>
                                    <span class="badge bg-light text-dark">
                                        <i class="fas fa-users me-1 small"></i>
                                        <span th:text="${evento.obtenerInscritos().size()}">0</span>
                                    </span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- html5-qrcode library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            let html5QrCode = null;
            let scanning = false;
            let scanCount = 0;
            let lastScannedToken = '';

            const btnToggle = document.getElementById('btnToggleScanner');
            const btnManual = document.getElementById('btnManualVerify');
            const manualInput = document.getElementById('manualToken');
            const resultCard = document.getElementById('resultCard');
            const resultContent = document.getElementById('resultContent');
            const recentScans = document.getElementById('recentScans');
            const scanCountBadge = document.getElementById('scanCount');
            const placeholder = document.getElementById('scanner-placeholder');
            const readerEl = document.getElementById('qr-reader');

            // Toggle scanner
            btnToggle.addEventListener('click', function() {
                if (scanning) {
                    stopScanner();
                } else {
                    startScanner();
                }
            });

            function startScanner() {
                placeholder.style.display = 'none';
                readerEl.style.display = 'block';

                html5QrCode = new Html5Qrcode("qr-reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    function() {} // ignore errors
                ).then(function() {
                    scanning = true;
                    btnToggle.innerHTML = '<i class="fas fa-stop me-1"></i>Detener';
                    btnToggle.classList.replace('btn-primary', 'btn-danger');
                }).catch(function(err) {
                    placeholder.style.display = 'block';
                    readerEl.style.display = 'none';
                    showResult(false, 'No se pudo acceder a la cámara: ' + err);
                });
            }

            function stopScanner() {
                if (html5QrCode && scanning) {
                    html5QrCode.stop().then(function() {
                        scanning = false;
                        btnToggle.innerHTML = '<i class="fas fa-play me-1"></i>Iniciar Escáner';
                        btnToggle.classList.replace('btn-danger', 'btn-primary');
                        readerEl.style.display = 'none';
                        placeholder.style.display = 'block';
                    });
                }
            }

            function onScanSuccess(decodedText) {
                // Prevent duplicate scans of same token
                if (decodedText === lastScannedToken) return;
                lastScannedToken = decodedText;
                verificarToken(decodedText);
                // Reset after 3 seconds to allow re-scan
                setTimeout(function() { lastScannedToken = ''; }, 3000);
            }

            // Manual verify
            btnManual.addEventListener('click', function() {
                const token = manualInput.value.trim();
                if (!token) return;
                verificarToken(token);
                manualInput.value = '';
            });

            manualInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    btnManual.click();
                }
            });

            async function verificarToken(token) {
                try {
                    const formData = new URLSearchParams();
                    formData.append('token', token);

                    const response = await fetch('/escanear-qr/verificar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });
                    const data = await response.json();

                    showResult(data.success, data.message, data.participante, data.evento, data.yaRegistrado);
                    addRecentScan(data);
                } catch (err) {
                    showResult(false, 'Error de conexión: ' + err.message);
                }
            }

            function showResult(success, message, participante, evento, yaRegistrado) {
                resultCard.style.display = 'block';
                let icon, colorClass;
                if (success) {
                    icon = 'fa-check-circle';
                    colorClass = 'text-success';
                } else if (yaRegistrado) {
                    icon = 'fa-info-circle';
                    colorClass = 'text-warning';
                } else {
                    icon = 'fa-times-circle';
                    colorClass = 'text-danger';
                }

                let html = '<div class="text-center mb-3">';
                html += '<i class="fas ' + icon + ' fa-3x ' + colorClass + '"></i>';
                html += '</div>';
                html += '<p class="text-center fw-semibold mb-2 ' + colorClass + '">' + message + '</p>';
                if (participante) {
                    html += '<div class="border-top pt-2 mt-2">';
                    html += '<div class="d-flex justify-content-between small mb-1"><span class="text-muted">Participante:</span><strong>' + participante + '</strong></div>';
                    html += '<div class="d-flex justify-content-between small"><span class="text-muted">Evento:</span><strong>' + evento + '</strong></div>';
                    html += '</div>';
                }
                resultContent.innerHTML = html;
            }

            function addRecentScan(data) {
                scanCount++;
                scanCountBadge.textContent = scanCount;

                if (scanCount === 1) {
                    recentScans.innerHTML = '';
                }

                const item = document.createElement('div');
                item.className = 'scan-history-item d-flex align-items-center gap-2 py-2 border-bottom';

                let icon, badgeClass;
                if (data.success) {
                    icon = 'fa-check-circle text-success';
                    badgeClass = 'bg-success';
                } else if (data.yaRegistrado) {
                    icon = 'fa-info-circle text-warning';
                    badgeClass = 'bg-warning';
                } else {
                    icon = 'fa-times-circle text-danger';
                    badgeClass = 'bg-danger';
                }

                const time = new Date().toLocaleTimeString('es-DO', {hour:'2-digit', minute:'2-digit'});
                item.innerHTML = '<i class="fas ' + icon + '"></i>' +
                    '<div class="flex-grow-1 small">' +
                    '<div class="fw-semibold">' + (data.participante || 'Desconocido') + '</div>' +
                    '<div class="text-muted" style="font-size:0.75rem">' + (data.evento || data.message) + '</div>' +
                    '</div>' +
                    '<small class="text-muted">' + time + '</small>';

                recentScans.insertBefore(item, recentScans.firstChild);
            }
        });
    </script>
</body>
</html>
