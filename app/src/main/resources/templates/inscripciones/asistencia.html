<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Lista de Asistencia</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="fas fa-clipboard-list me-2 text-primary"></i>Lista de Asistencia
                    </h2>
                    <p class="text-muted mb-0" th:text="${evento.titulo}">Evento</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="/escanear-qr" class="btn btn-primary btn-sm">
                        <i class="fas fa-qrcode me-1"></i>Escanear QR
                    </a>
                    <a href="/mis-eventos" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-left me-1"></i>Volver
                    </a>
                </div>
            </div>

            <!-- Stats row -->
            <div class="row g-3 mb-4">
                <div class="col-sm-4">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(67, 97, 238, 0.1); color: var(--primary);">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalInscritos}">0</span>
                            <span class="stat-label">Inscritos</span>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalPresentes}">0</span>
                            <span class="stat-label">Presentes</span>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                            <i class="fas fa-percentage"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value">
                                <span th:text="${totalInscritos > 0 ? #numbers.formatDecimal(totalPresentes * 100.0 / totalInscritos, 0, 1) : '0'}">0</span>%
                            </span>
                            <span class="stat-label">Asistencia</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Attendance table -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(inscripciones)}" class="text-center py-5">
                        <i class="fas fa-users fa-2x text-muted mb-2 d-block"></i>
                        <p class="text-muted mb-0">No hay inscritos en este evento</p>
                    </div>
                    <div th:unless="${#lists.isEmpty(inscripciones)}" class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th>#</th>
                                    <th>Participante</th>
                                    <th>Usuario</th>
                                    <th>Fecha Inscripción</th>
                                    <th class="text-center">Estado</th>
                                    <th>Hora Asistencia</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="insc, iter : ${inscripciones}"
                                    th:classappend="${insc.estaPresente} ? 'table-success' : ''">
                                    <td th:text="${iter.index + 1}">1</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <i class="fas fa-user-circle text-muted"></i>
                                            <span class="fw-semibold" th:text="${insc.usuario.nombre}">Nombre</span>
                                        </div>
                                    </td>
                                    <td class="text-muted" th:text="${insc.usuario.username}">username</td>
                                    <td th:text="${#temporals.format(insc.fechaInscripcion, 'dd/MM/yyyy HH:mm')}">Fecha</td>
                                    <td class="text-center">
                                        <span class="badge bg-success" th:if="${insc.estaPresente}">
                                            <i class="fas fa-check me-1"></i>Presente
                                        </span>
                                        <span class="badge bg-secondary" th:unless="${insc.estaPresente}">
                                            <i class="fas fa-clock me-1"></i>Pendiente
                                        </span>
                                    </td>
                                    <td>
                                        <span th:if="${insc.estaPresente}" th:text="${#temporals.format(insc.fechaAsistencia, 'dd/MM/yyyy HH:mm')}">Hora</span>
                                        <span th:unless="${insc.estaPresente}" class="text-muted">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }
        });
    </script>
</body>
</html>
