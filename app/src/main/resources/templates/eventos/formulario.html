<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Formulario Evento</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <a th:href="${editando} ? '/mis-eventos' : '/mis-eventos'" class="btn btn-outline-secondary btn-sm mb-3">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </a>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <h3 class="fw-bold mb-4">
                                <i class="fas fa-calendar-plus me-2 text-primary" th:unless="${editando}"></i>
                                <i class="fas fa-edit me-2 text-primary" th:if="${editando}"></i>
                                <span th:text="${editando} ? 'Editar Evento' : 'Crear Evento'">Formulario</span>
                            </h3>

                            <!-- Error alert -->
                            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                            <form id="eventoForm" method="post"
                                  th:action="${editando} ? '/eventos/' + ${evento.id} + '/editar' : '/eventos/crear'">
                                <div class="mb-3">
                                    <label for="titulo" class="form-label fw-medium">Título *</label>
                                    <input type="text" class="form-control" id="titulo" name="titulo"
                                           th:value="${editando} ? ${evento.titulo} : ''"
                                           placeholder="Nombre del evento" required maxlength="200">
                                    <div class="invalid-feedback">El título es requerido</div>
                                </div>

                                <div class="mb-3">
                                    <label for="descripcion" class="form-label fw-medium">Descripción</label>
                                    <textarea class="form-control" id="descripcion" name="descripcion" rows="4"
                                              placeholder="Describe el evento..."
                                              th:text="${editando} ? ${evento.descripcion} : ''"></textarea>
                                </div>

                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label for="fechaInicio" class="form-label fw-medium">Fecha Inicio *</label>
                                        <input type="datetime-local" class="form-control" id="fechaInicio" name="fechaInicio"
                                               th:value="${editando} ? ${fechaInicioStr} : ''"
                                               required>
                                        <div class="invalid-feedback">La fecha de inicio es requerida</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="fechaFin" class="form-label fw-medium">Fecha Fin *</label>
                                        <input type="datetime-local" class="form-control" id="fechaFin" name="fechaFin"
                                               th:value="${editando} ? ${fechaFinStr} : ''"
                                               required>
                                        <div class="invalid-feedback">La fecha de fin es requerida</div>
                                    </div>
                                </div>

                                <div class="row g-3 mb-3">
                                    <div class="col-md-8">
                                        <label for="lugar" class="form-label fw-medium">Lugar *</label>
                                        <input type="text" class="form-control" id="lugar" name="lugar"
                                               th:value="${editando} ? ${evento.lugar} : ''"
                                               placeholder="Ubicación del evento" required maxlength="200">
                                        <div class="invalid-feedback">El lugar es requerido</div>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="cupoMaximo" class="form-label fw-medium">Cupo Máximo *</label>
                                        <input type="number" class="form-control" id="cupoMaximo" name="cupoMaximo"
                                               th:value="${editando} ? ${evento.cupoMaximo} : ''"
                                               min="1" placeholder="50" required>
                                        <div class="invalid-feedback">Debe ser al menos 1</div>
                                    </div>
                                </div>

                                <div class="d-flex gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>
                                        <span th:text="${editando} ? 'Guardar Cambios' : 'Crear Evento'">Guardar</span>
                                    </button>
                                    <a href="/mis-eventos" class="btn btn-outline-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            // Form validation
            const form = document.getElementById('eventoForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    let valid = true;
                    const titulo = document.getElementById('titulo');
                    const fechaInicio = document.getElementById('fechaInicio');
                    const fechaFin = document.getElementById('fechaFin');
                    const lugar = document.getElementById('lugar');
                    const cupo = document.getElementById('cupoMaximo');

                    [titulo, fechaInicio, fechaFin, lugar, cupo].forEach(el => el.classList.remove('is-invalid'));

                    if (!titulo.value.trim()) { titulo.classList.add('is-invalid'); valid = false; }
                    if (!fechaInicio.value) { fechaInicio.classList.add('is-invalid'); valid = false; }
                    if (!fechaFin.value) { fechaFin.classList.add('is-invalid'); valid = false; }
                    if (!lugar.value.trim()) { lugar.classList.add('is-invalid'); valid = false; }
                    if (!cupo.value || parseInt(cupo.value) < 1) { cupo.classList.add('is-invalid'); valid = false; }

                    if (fechaInicio.value && fechaFin.value && new Date(fechaFin.value) <= new Date(fechaInicio.value)) {
                        fechaFin.classList.add('is-invalid');
                        valid = false;
                    }

                    if (!valid) e.preventDefault();
                });
            }
        });
    </script>
</body>
</html>
