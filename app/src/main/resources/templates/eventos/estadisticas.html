<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Estadísticas</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="fas fa-chart-line me-2 text-primary"></i>Estadísticas
                    </h2>
                    <p class="text-muted mb-0" th:text="${evento.titulo}">Evento</p>
                </div>
                <a href="/mis-eventos" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left me-1"></i>Volver a Mis Eventos
                </a>
            </div>

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-primary-subtle text-primary">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalInscritos}">0</span>
                            <span class="stat-label">Inscritos</span>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-success-subtle text-success">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalAsistentes}">0</span>
                            <span class="stat-label">Asistentes</span>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-warning-subtle text-warning">
                            <i class="fas fa-percentage"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value"><span th:text="${porcentajeAsistencia}">0</span>%</span>
                            <span class="stat-label">Asistencia</span>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-info-subtle text-info">
                            <i class="fas fa-chair"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${cuposDisponibles}">0</span>
                            <span class="stat-label">Cupos Disponibles</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="row g-4 mb-4">
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-pie me-2 text-success"></i>Asistencia</h6>
                            <canvas id="chartAsistencia" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-pie me-2 text-primary"></i>Capacidad</h6>
                            <canvas id="chartCapacidad" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-12 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-bar me-2 text-info"></i>Asistencia por Hora</h6>
                            <canvas id="chartPorHora" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-line me-2 text-warning"></i>Inscripciones por Día</h6>
                            <canvas id="chartPorDia" height="100"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="row g-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title fw-semibold mb-3">
                                <i class="fas fa-bolt me-2 text-warning"></i>Acciones
                            </h5>
                            <div class="d-flex flex-wrap gap-2">
                                <a th:href="'/eventos/' + ${evento.id} + '/asistencia'" class="btn btn-outline-info">
                                    <i class="fas fa-clipboard-list me-1"></i>Ver Lista de Asistencia
                                </a>
                                <a th:href="'/eventos/' + ${evento.id} + '/editar'" class="btn btn-outline-primary">
                                    <i class="fas fa-edit me-1"></i>Editar Evento
                                </a>
                                <a href="/escanear-qr" class="btn btn-outline-success">
                                    <i class="fas fa-qrcode me-1"></i>Escanear QR
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Hidden data elements for Chart.js -->
    <div id="chartDataStats" style="display:none"
         th:data-asistencia-labels="${asistenciaLabels}"
         th:data-asistencia-data="${asistenciaData}"
         th:data-por-dia-labels="${porDiaLabels}"
         th:data-por-dia-data="${porDiaData}"
         th:data-por-hora-labels="${porHoraLabels}"
         th:data-por-hora-data="${porHoraData}"
         th:data-capacidad-labels="${capacidadLabels}"
         th:data-capacidad-data="${capacidadData}">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            const colors = {
                primary: '#4361ee',
                success: '#10b981',
                warning: '#f59e0b',
                danger: '#ef4444',
                info: '#06b6d4',
                secondary: '#6b7280',
                purple: '#8b5cf6'
            };

            var d = document.getElementById('chartDataStats');
            if (!d) return;

            // Attendance donut
            new Chart(document.getElementById('chartAsistencia'), {
                type: 'doughnut',
                data: {
                    labels: JSON.parse(d.dataset.asistenciaLabels || '[]'),
                    datasets: [{
                        data: JSON.parse(d.dataset.asistenciaData || '[]'),
                        backgroundColor: [colors.success, colors.secondary]
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            // Capacity donut
            new Chart(document.getElementById('chartCapacidad'), {
                type: 'doughnut',
                data: {
                    labels: JSON.parse(d.dataset.capacidadLabels || '[]'),
                    datasets: [{
                        data: JSON.parse(d.dataset.capacidadData || '[]'),
                        backgroundColor: [colors.primary, colors.info]
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            // Attendance by hour - bar
            new Chart(document.getElementById('chartPorHora'), {
                type: 'bar',
                data: {
                    labels: JSON.parse(d.dataset.porHoraLabels || '[]'),
                    datasets: [{
                        label: 'Asistencias',
                        data: JSON.parse(d.dataset.porHoraData || '[]'),
                        backgroundColor: colors.info
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: { legend: { display: false } }
                }
            });

            // Inscriptions per day - line
            new Chart(document.getElementById('chartPorDia'), {
                type: 'line',
                data: {
                    labels: JSON.parse(d.dataset.porDiaLabels || '[]'),
                    datasets: [{
                        label: 'Inscripciones',
                        data: JSON.parse(d.dataset.porDiaData || '[]'),
                        borderColor: colors.warning,
                        backgroundColor: colors.warning + '33',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: { legend: { position: 'top' } }
                }
            });
        });
    </script>
</body>
</html>
