<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Editar Usuario</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="fas fa-user-edit me-2 text-danger"></i>Editar Usuario
                    </h2>
                    <p class="text-muted mb-0">Modificar datos del usuario <strong th:text="${target.nombre}">Nombre</strong></p>
                </div>
                <a href="/admin/usuarios" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left me-1"></i>Volver a Usuarios
                </a>
            </div>

            <!-- Alert -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-circle me-1"></i>
                <span th:text="${error}">Error</span>
            </div>

            <div class="row">
                <div class="col-lg-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <form method="post" th:action="'/admin/usuarios/' + ${target.id} + '/editar'" id="formEditarUsuario" novalidate>
                                <!-- Nombre -->
                                <div class="mb-3">
                                    <label for="nombre" class="form-label fw-semibold">Nombre completo</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre"
                                           th:value="${target.nombre}" required minlength="2">
                                    <div class="invalid-feedback">El nombre es requerido (mínimo 2 caracteres)</div>
                                </div>

                                <!-- Username -->
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-at"></i></span>
                                        <input type="text" class="form-control" id="username" name="username"
                                               th:value="${target.username}" required minlength="3">
                                    </div>
                                    <div class="invalid-feedback">El username es requerido (mínimo 3 caracteres)</div>
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-semibold">Nueva Contraseña</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="password" name="password"
                                               placeholder="Dejar vacío para mantener la actual">
                                        <button type="button" class="btn btn-outline-secondary toggle-password" id="togglePass">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="form-text">Solo completa si deseas cambiar la contraseña. Mínimo 4 caracteres.</div>
                                </div>

                                <!-- Rol -->
                                <div class="mb-4">
                                    <label for="rol" class="form-label fw-semibold">Rol asignado</label>
                                    <select class="form-select" id="rol" name="rol" required>
                                        <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.name()}"
                                                th:selected="${r.name() == target.rol.name()}">Rol</option>
                                    </select>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary flex-fill">
                                        <i class="fas fa-save me-1"></i>Guardar Cambios
                                    </button>
                                    <a href="/admin/usuarios" class="btn btn-outline-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- User info card -->
                <div class="col-lg-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-info-circle me-2 text-primary"></i>Información del Usuario</h6>
                            <div class="mb-2 d-flex justify-content-between small">
                                <span class="text-muted">ID:</span>
                                <strong th:text="${target.id}">1</strong>
                            </div>
                            <div class="mb-2 d-flex justify-content-between small">
                                <span class="text-muted">Estado:</span>
                                <span class="badge" th:classappend="${target.activo} ? 'bg-success' : 'bg-danger'"
                                      th:text="${target.activo} ? 'Activo' : 'Bloqueado'">Estado</span>
                            </div>
                            <div class="mb-2 d-flex justify-content-between small">
                                <span class="text-muted">Fecha de creación:</span>
                                <span th:text="${#temporals.format(target.fechaCreacion, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                            </div>
                            <div class="mb-2 d-flex justify-content-between small">
                                <span class="text-muted">Protegido:</span>
                                <span th:text="${!target.eliminable} ? 'Sí' : 'No'">No</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            // Toggle password visibility
            const toggleBtn = document.getElementById('togglePass');
            const passInput = document.getElementById('password');
            if (toggleBtn && passInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = passInput.type === 'password' ? 'text' : 'password';
                    passInput.type = type;
                    this.querySelector('i').classList.toggle('fa-eye');
                    this.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }

            // Client-side validation
            const form = document.getElementById('formEditarUsuario');
            if (form) {
                form.addEventListener('submit', function(e) {
                    let valid = true;
                    const nombre = document.getElementById('nombre');
                    const username = document.getElementById('username');
                    const password = document.getElementById('password');

                    [nombre, username, password].forEach(function(el) { el.classList.remove('is-invalid'); });

                    if (!nombre.value.trim() || nombre.value.trim().length < 2) {
                        nombre.classList.add('is-invalid');
                        valid = false;
                    }
                    if (!username.value.trim() || username.value.trim().length < 3) {
                        username.classList.add('is-invalid');
                        valid = false;
                    }
                    if (password.value && password.value.length < 4) {
                        password.classList.add('is-invalid');
                        valid = false;
                    }

                    if (!valid) e.preventDefault();
                });
            }
        });
    </script>
</body>
</html>
