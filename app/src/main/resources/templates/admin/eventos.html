<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Gestión Eventos</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="pageContent">
        <div class="container-fluid p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">
                    <i class="fas fa-calendar-times me-2 text-danger"></i>Gestión de Eventos
                </h2>
                <p class="text-muted mb-0">Administra todos los eventos del sistema</p>
            </div>

            <div th:if="${#lists.isEmpty(eventos)}" class="text-center py-5">
                <i class="fas fa-calendar-times fa-3x text-muted mb-3"></i>
                <h5 class="text-muted">No hay eventos en el sistema</h5>
            </div>

            <div class="card border-0 shadow-sm" th:unless="${#lists.isEmpty(eventos)}">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Organizador</th>
                                <th>Fecha</th>
                                <th>Inscritos</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="evento : ${eventos}" th:classappend="${evento.cancelado} ? 'table-secondary' : ''">
                                <td th:text="${evento.id}">1</td>
                                <td class="fw-semibold">
                                    <a th:href="'/eventos/' + ${evento.id}" class="text-decoration-none" th:text="${evento.titulo}">Evento</a>
                                </td>
                                <td th:text="${evento.organizador.nombre}">Organizador</td>
                                <td th:text="${#temporals.format(evento.fechaInicio, 'dd/MM/yyyy HH:mm')}">Fecha</td>
                                <td>
                                    <span th:text="${evento.cupoMaximo - evento.cuposDisponibles}">0</span> /
                                    <span th:text="${evento.cupoMaximo}">0</span>
                                </td>
                                <td>
                                    <span class="badge bg-dark" th:if="${evento.cancelado}">Cancelado</span>
                                    <span class="badge bg-success" th:if="${!evento.cancelado && evento.disponible}">Publicado</span>
                                    <span class="badge bg-warning text-dark" th:if="${!evento.cancelado && !evento.disponible}">Borrador</span>
                                </td>
                                <td class="text-end">
                                    <button type="button" class="btn btn-outline-danger btn-sm btn-eliminar"
                                            th:data-id="${evento.id}" th:data-titulo="${evento.titulo}"
                                            title="Eliminar evento">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('pageContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            // Delete event
            document.querySelectorAll('.btn-eliminar').forEach(function(btn) {
                btn.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    const titulo = this.dataset.titulo;
                    if (!confirm('¿Eliminar el evento "' + titulo + '"? Esta acción no se puede deshacer.')) return;
                    try {
                        const data = await window.apiFetch('/admin/eventos/' + id + '/eliminar', { method: 'POST' });
                        if (data.success) {
                            location.reload();
                        } else {
                            alert(data.message || 'Error al eliminar');
                        }
                    } catch (err) {
                        alert('Error: ' + err.message);
                    }
                });
            });
        });
    </script>
</body>
</html>
