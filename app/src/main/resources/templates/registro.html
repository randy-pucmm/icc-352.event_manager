<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Event Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Crear Cuenta</h1>
                <p>Regístrate como participante</p>
            </div>

            <!-- Alerts -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}">Error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form action="/registro" method="post" id="registroForm" novalidate>
                <div class="mb-3">
                    <label for="nombre" class="form-label">
                        <i class="fas fa-id-card me-1"></i>Nombre Completo
                    </label>
                    <input type="text" class="form-control" id="nombre" name="nombre"
                           placeholder="Ingrese su nombre completo" required>
                    <div class="invalid-feedback">El nombre es requerido.</div>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-1"></i>Usuario
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Elija un nombre de usuario" required>
                    <div class="invalid-feedback">El usuario es requerido (mínimo 3 caracteres).</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-1"></i>Contraseña
                    </label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Mínimo 6 caracteres" required minlength="6">
                        <button class="btn btn-outline-secondary toggle-password" type="button"
                                data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock me-1"></i>Confirmar Contraseña
                    </label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                               placeholder="Repita la contraseña" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button"
                                data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="confirmPasswordFeedback">Las contraseñas no coinciden.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 auth-btn">
                    <i class="fas fa-user-plus me-2"></i>Registrarse
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
