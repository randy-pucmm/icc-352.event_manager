<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}">
    <title>Dashboard</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: sidebar}">
    </div>

    <template id="dashboardContent">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="fas fa-tachometer-alt me-2 text-primary"></i>Dashboard
                    </h2>
                    <p class="text-muted mb-0">Bienvenido, <span th:text="${usuario.nombre}">Usuario</span></p>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-primary-subtle text-primary">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalEventos}">0</span>
                            <span class="stat-label">Eventos Disponibles</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-xl-3" th:if="${usuario.rol.name() == 'PARTICIPANTE'}">
                    <div class="stat-card">
                        <div class="stat-icon bg-success-subtle text-success">
                            <i class="fas fa-ticket-alt"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${misInscripciones != null} ? ${misInscripciones} : 0">0</span>
                            <span class="stat-label">Mis Inscripciones</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-xl-3" th:if="${usuario.rol.name() == 'ORGANIZADOR' or usuario.rol.name() == 'ADMINISTRADOR'}">
                    <div class="stat-card">
                        <div class="stat-icon bg-warning-subtle text-warning">
                            <i class="fas fa-list-alt"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${misEventos != null} ? ${misEventos} : 0">0</span>
                            <span class="stat-label">Mis Eventos</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-xl-3" th:if="${usuario.rol.name() == 'ORGANIZADOR' or usuario.rol.name() == 'ADMINISTRADOR'}">
                    <div class="stat-card">
                        <div class="stat-icon bg-success-subtle text-success">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${orgTotalInscritos != null} ? ${orgTotalInscritos} : 0">0</span>
                            <span class="stat-label">Total Inscritos</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-xl-3" th:if="${usuario.rol.name() == 'ADMINISTRADOR'}">
                    <div class="stat-card">
                        <div class="stat-icon bg-danger-subtle text-danger">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalUsuarios != null} ? ${totalUsuarios} : 0">0</span>
                            <span class="stat-label">Total Usuarios</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-xl-3" th:if="${usuario.rol.name() == 'ADMINISTRADOR'}">
                    <div class="stat-card">
                        <div class="stat-icon bg-info-subtle text-info">
                            <i class="fas fa-globe"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" th:text="${totalEventosSistema != null} ? ${totalEventosSistema} : 0">0</span>
                            <span class="stat-label">Total Eventos</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===================== ADMIN CHARTS ===================== -->
            <div th:if="${usuario.rol.name() == 'ADMINISTRADOR'}" class="row g-4 mb-4">
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-users me-2 text-danger"></i>Usuarios por Rol</h6>
                            <canvas id="chartUsersByRole" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-calendar me-2 text-info"></i>Estado de Eventos</h6>
                            <canvas id="chartEventStatus" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-12 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-pie me-2 text-success"></i>Asistencia Global</h6>
                            <canvas id="chartGlobalAttendance" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-bar me-2 text-primary"></i>Top Eventos - Inscritos vs Asistentes</h6>
                            <canvas id="chartTopEvents" height="100"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===================== ORGANIZER CHARTS ===================== -->
            <div th:if="${usuario.rol.name() == 'ORGANIZADOR'}" class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-pie me-2 text-success"></i>Mi Asistencia Total</h6>
                            <canvas id="chartOrgAttendance" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-bar me-2 text-primary"></i>Mis Eventos - Inscritos vs Asistentes</h6>
                            <canvas id="chartOrgEvents" height="220"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===================== PARTICIPANT CHARTS ===================== -->
            <div th:if="${usuario.rol.name() == 'PARTICIPANTE'}" class="row g-4 mb-4">
                <div class="col-md-6 mx-auto">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="fw-semibold mb-3"><i class="fas fa-chart-pie me-2 text-success"></i>Estado de mis Inscripciones</h6>
                            <canvas id="chartPartStatus" height="220"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="row g-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title fw-semibold mb-3">
                                <i class="fas fa-bolt me-2 text-warning"></i>Acciones Rápidas
                            </h5>
                            <div class="d-flex flex-wrap gap-2">
                                <a href="/eventos" class="btn btn-outline-primary">
                                    <i class="fas fa-calendar-alt me-1"></i>Ver Eventos
                                </a>
                                <a href="/eventos/crear" class="btn btn-outline-success"
                                   th:if="${usuario.rol.name() == 'ORGANIZADOR' or usuario.rol.name() == 'ADMINISTRADOR'}">
                                    <i class="fas fa-plus-circle me-1"></i>Crear Evento
                                </a>
                                <a href="/escanear-qr" class="btn btn-outline-info"
                                   th:if="${usuario.rol.name() == 'ORGANIZADOR' or usuario.rol.name() == 'ADMINISTRADOR'}">
                                    <i class="fas fa-qrcode me-1"></i>Escanear QR
                                </a>
                                <a href="/admin/usuarios" class="btn btn-outline-danger"
                                   th:if="${usuario.rol.name() == 'ADMINISTRADOR'}">
                                    <i class="fas fa-users-cog me-1"></i>Gestionar Usuarios
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Hidden data elements for Chart.js -->
    <div id="chartData" style="display:none"
         th:if="${usuario.rol.name() == 'ADMINISTRADOR'}"
         th:data-users-role-labels="${usersByRoleLabels}"
         th:data-users-role-data="${usersByRoleData}"
         th:data-event-status-labels="${eventStatusLabels}"
         th:data-event-status-data="${eventStatusData}"
         th:data-top-event-labels="${topEventLabels}"
         th:data-top-event-inscritos="${topEventInscritos}"
         th:data-top-event-asistentes="${topEventAsistentes}"
         th:data-total-inscritos="${totalInscritos}"
         th:data-total-asistentes="${totalAsistentes}">
    </div>
    <div id="chartDataOrg" style="display:none"
         th:if="${usuario.rol.name() == 'ORGANIZADOR'}"
         th:data-event-labels="${orgEventLabels}"
         th:data-event-inscritos="${orgEventInscritos}"
         th:data-event-asistentes="${orgEventAsistentes}"
         th:data-total-inscritos="${orgTotalInscritos}"
         th:data-total-asistentes="${orgTotalAsistentes}">
    </div>
    <div id="chartDataPart" style="display:none"
         th:if="${usuario.rol.name() == 'PARTICIPANTE'}"
         th:data-status-labels="${partStatusLabels}"
         th:data-status-data="${partStatusData}">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('dashboardContent');
            const mainArea = document.querySelector('.main-content');
            if (content && mainArea) {
                mainArea.innerHTML = content.innerHTML;
            }

            const colors = {
                primary: '#4361ee',
                success: '#10b981',
                warning: '#f59e0b',
                danger: '#ef4444',
                info: '#06b6d4',
                secondary: '#6b7280',
                purple: '#8b5cf6'
            };

            // ========== ADMIN CHARTS ==========
            var adminData = document.getElementById('chartData');
            if (adminData) {
                // Users by role - Doughnut
                new Chart(document.getElementById('chartUsersByRole'), {
                    type: 'doughnut',
                    data: {
                        labels: JSON.parse(adminData.dataset.usersRoleLabels || '[]'),
                        datasets: [{
                            data: JSON.parse(adminData.dataset.usersRoleData || '[]'),
                            backgroundColor: [colors.danger, colors.primary, colors.success, colors.warning]
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });

                // Event status - Doughnut
                new Chart(document.getElementById('chartEventStatus'), {
                    type: 'doughnut',
                    data: {
                        labels: JSON.parse(adminData.dataset.eventStatusLabels || '[]'),
                        datasets: [{
                            data: JSON.parse(adminData.dataset.eventStatusData || '[]'),
                            backgroundColor: [colors.success, colors.warning, colors.secondary]
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });

                // Global attendance - Doughnut
                var ti = parseInt(adminData.dataset.totalInscritos || '0');
                var ta = parseInt(adminData.dataset.totalAsistentes || '0');
                new Chart(document.getElementById('chartGlobalAttendance'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Asistieron', 'Pendientes'],
                        datasets: [{
                            data: [ta, ti - ta],
                            backgroundColor: [colors.success, colors.secondary]
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });

                // Top events - Bar
                new Chart(document.getElementById('chartTopEvents'), {
                    type: 'bar',
                    data: {
                        labels: JSON.parse(adminData.dataset.topEventLabels || '[]'),
                        datasets: [
                            { label: 'Inscritos', data: JSON.parse(adminData.dataset.topEventInscritos || '[]'), backgroundColor: colors.primary },
                            { label: 'Asistentes', data: JSON.parse(adminData.dataset.topEventAsistentes || '[]'), backgroundColor: colors.success }
                        ]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { position: 'top' } } }
                });
            }

            // ========== ORGANIZER CHARTS ==========
            var orgData = document.getElementById('chartDataOrg');
            if (orgData) {
                // Org attendance donut
                var oti = parseInt(orgData.dataset.totalInscritos || '0');
                var ota = parseInt(orgData.dataset.totalAsistentes || '0');
                new Chart(document.getElementById('chartOrgAttendance'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Asistieron', 'Pendientes'],
                        datasets: [{
                            data: [ota, oti - ota],
                            backgroundColor: [colors.success, colors.secondary]
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });

                // Org events bar
                new Chart(document.getElementById('chartOrgEvents'), {
                    type: 'bar',
                    data: {
                        labels: JSON.parse(orgData.dataset.eventLabels || '[]'),
                        datasets: [
                            { label: 'Inscritos', data: JSON.parse(orgData.dataset.eventInscritos || '[]'), backgroundColor: colors.primary },
                            { label: 'Asistentes', data: JSON.parse(orgData.dataset.eventAsistentes || '[]'), backgroundColor: colors.success }
                        ]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { position: 'top' } } }
                });
            }

            // ========== PARTICIPANT CHARTS ==========
            var partData = document.getElementById('chartDataPart');
            if (partData) {
                new Chart(document.getElementById('chartPartStatus'), {
                    type: 'doughnut',
                    data: {
                        labels: JSON.parse(partData.dataset.statusLabels || '[]'),
                        datasets: [{
                            data: JSON.parse(partData.dataset.statusData || '[]'),
                            backgroundColor: [colors.primary, colors.success, colors.secondary]
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });
            }
        });
    </script>
</body>
</html>
